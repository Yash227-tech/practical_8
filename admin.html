<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HotWheels</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-form {
            max-width: 600px;
            margin: 40px auto;
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .preview-container {
            width: 100%;
            height: 200px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">🏎️</span>
                Hot<span>Wheels</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="collection.html" class="nav-link">Collection</a></li>
                <li><a href="admin.html" class="nav-link active">Admin</a></li>
            </ul>
        </div>
    </nav>

    <main class="section" style="padding-top: 120px;">
        <div class="container">
            <div class="admin-header">
                <h1 class="section-title">Add <span class="text-gradient">New Product</span></h1>
                <p class="section-subtitle">Upload car models directly to Cloudinary and MongoDB</p>
            </div>

            <div class="admin-form">
                <div id="alert-container"></div>
                <form id="product-form">
                    <div class="form-group">
                        <label class="form-label">Car Name</label>
                        <input type="text" id="p-name" class="form-input" placeholder="e.g. Bugatti Veyron" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Price (INR)</label>
                            <input type="number" id="p-price" class="form-input" placeholder="e.g. 5000" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select id="p-category" class="form-input" required style="background: var(--bg-tertiary); color: white;">
                                <option value="Sports Cars">Sports Cars</option>
                                <option value="Supercars">Supercars</option>
                                <option value="Muscle Cars">Muscle Cars</option>
                                <option value="Hypercars">Hypercars</option>
                                <option value="Luxury Cars">Luxury Cars</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Product Image</label>
                        <input type="file" id="p-image" class="form-input" accept="image/*" required>
                        <div class="preview-container" id="image-preview">
                            <span style="color: var(--text-muted);">No image selected</span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 20px;">
                        🚀 Upload to Cloudinary
                    </button>
                </form>
            </div>
        </div>
    </main>

    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: white; font-weight: 500;">Uploading to Cloudinary...</p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Redirect to login if not logged in
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }

        const imageInput = document.getElementById('p-image');
        const preview = document.getElementById('image-preview');

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                }
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loader = document.getElementById('loader');
            const alertContainer = document.getElementById('alert-container');
            
            const formData = new FormData();
            formData.append('name', document.getElementById('p-name').value);
            formData.append('price', document.getElementById('p-price').value);
            formData.append('category', document.getElementById('p-category').value);
            formData.append('image', imageInput.files[0]);

            const token = getToken();

            try {
                loader.style.display = 'flex';
                const response = await fetch('http://localhost:5000/api/products', {
                    method: 'POST',
                    headers: {
                        'Authorization': token
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    alertContainer.innerHTML = `<div class="alert alert-success">✓ Product uploaded successfully! View it in the collection.</div>`;
                    document.getElementById('product-form').reset();
                    preview.innerHTML = `<span style="color: var(--text-muted);">No image selected</span>`;
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-error">⚠️ ${data.error || 'Upload failed'}</div>`;
                }
            } catch (err) {
                alertContainer.innerHTML = `<div class="alert alert-error">⚠️ Server Error. Is the backend running?</div>`;
            } finally {
                loader.style.display = 'none';
            }
        });
    </script>
</body>

</html>
